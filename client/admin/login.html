<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="/public/css/font.css" />
    <link rel="stylesheet" href="/public/admin/css/theme.css" />
    <link rel="stylesheet" href="/public/admin/css/login.css" />

    <title>Marketing Dashboard Login</title>
  </head>

  <body>
    <div class="login-wrapper">
      <div class="login-card">
        <div class="branding">
          <img src="/public/web/assets/images/new-logo.png" class="logo" />
          <h1>Marketing Dashboard</h1>
          <p>Manage blogs & leads</p>
        </div>

        <form>
          <div class="input">
            <label>Username</label>
            <input name="username" placeholder="Enter your username" required />
          </div>

          <div class="input">
            <label>Password</label>
            <input
              type="password"
              name="password"
              placeholder="Enter password"
              required
            />
          </div>

          <button type="submit">Login</button>
        </form>

        <div class="footer">
          <p>© 2026 2xcell</p>
        </div>
      </div>
    </div>

    <script defer src="/public/admin/js/login.js"></script>
  </body>
</html>
